<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/app-icon-dark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>SocialSentry</title>
    <!-- Self-hosted fonts (see src/index.css @font-face). Preload the Cyrillic
         subsets since the UI is Russian — avoids a swap flash on first paint. -->
    <link
      rel="preload"
      href="/fonts/golos-text-cyrillic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/jetbrains-mono-cyrillic.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      // Set theme before first paint to avoid a flash of the wrong theme (FOUC).
      // Default: follow OS preference unless the user has explicitly chosen one.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
