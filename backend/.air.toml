root = "."
tmp_dir = "tmp"

[build]
  bin = "tmp/api"
  cmd = "go build -o tmp/api ./cmd/api"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "internal/db/generated", "bin"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "500ms"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
