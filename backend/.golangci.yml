# golangci-lint config for the SocialSentry backend.
# Run from backend/: `golangci-lint run ./...`
#
# Linter set is intentionally lean — we focus on real bugs (govet, ineffassign,
# unused) and obvious smells (errcheck, staticcheck). Style-only linters are off
# because gofmt + a code review are the right place for that.

run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck      # unchecked error returns
    - gofmt         # formatting (CI gate; matches the gofmt -l check)
    - goimports     # import grouping + missing imports
    - govet         # the vet suite
    - ineffassign   # ineffectual assignments
    - misspell      # common typos in comments
    - revive        # configurable replacement for golint
    - staticcheck   # the staticcheck suite (replaces deprecated megacheck)
    - unused        # dead code / unused identifiers

linters-settings:
  goimports:
    local-prefixes: github.com/rabb1tof/socialsentry/backend
  revive:
    rules:
      - name: exported
        disabled: true     # we already document exported symbols; revive's heuristics are noisy
      - name: var-naming
      - name: package-comments
      - name: indent-error-flow
      - name: errorf

issues:
  exclude-rules:
    # Generated sqlc code is allowed to drift from our style.
    - path: internal/db/generated/
      linters:
        - errcheck
        - revive
        - staticcheck
        - unused
        - gofmt
        - goimports
    # Tests are allowed to use any/interface{} freely and skip a few error checks.
    - path: _test\.go$
      linters:
        - errcheck
        - revive
  max-same-issues: 0    # report every occurrence
  max-issues-per-linter: 0
