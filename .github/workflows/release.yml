name: Release

# Publish a semver tag (e.g. `git tag v1.2.0 && git push origin v1.2.0`) to
# build + push the three production images to GHCR and cut a GitHub Release.
# Pre-release tags (e.g. v1.2.0-rc.1) are marked as pre-releases and do NOT
# move the `latest` tag.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  images:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: ./backend
            target: production
          - image: worker
            context: ./backend
            target: production-worker
          - image: frontend
            context: ./frontend
            target: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags from the git tag. metadata-action lowercases the
      # image name (GHCR requires lowercase) and, with latest=auto, only moves
      # `latest` for stable (non-prerelease) semver tags.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: false

  release:
    name: Create GitHub Release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so auto-generated notes can diff tags

      - name: Resolve vars
        id: vars
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          # Auto-mark v*-rc.* / v*-beta.* etc. as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true # GitHub appends the commit/PR changelog
          body: |
            ## Docker images (GHCR)

            ```
            docker pull ${{ env.REGISTRY }}/${{ steps.vars.outputs.repo_lc }}/api:${{ steps.vars.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ steps.vars.outputs.repo_lc }}/worker:${{ steps.vars.outputs.version }}
            docker pull ${{ env.REGISTRY }}/${{ steps.vars.outputs.repo_lc }}/frontend:${{ steps.vars.outputs.version }}
            ```
